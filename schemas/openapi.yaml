openapi: 3.1.0
info:
  title: AgentPDF Local API
  version: 0.1.0
  description: Local and hosted-compatible API for AgentPDF tools.
paths:
  /healthz:
    get:
      operationId: healthz
      responses:
        '200':
          description: OK
  /v1/tools:
    get:
      operationId: listTools
      responses:
        '200':
          description: Tool manifest
  /v1/tools/{tool_name}:
    get:
      operationId: getTool
      parameters:
        - name: tool_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tool details
        '404':
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPDFErrorResponse'
  /v1/tools/{tool_name}/run:
    post:
      operationId: runTool
      parameters:
        - name: tool_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Tool result
        '400':
          description: Tool failed or is not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResult'
        '400':
          description: Tool failed or is not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResult'
        '404':
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPDFErrorResponse'
  /v1/jobs/{job_id}:
    get:
      operationId: getJob
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPDFErrorResponse'
  /v1/artifacts/{artifact_id}:
    get:
      operationId: getArtifact
      parameters:
        - name: artifact_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Artifact metadata
        '404':
          description: Artifact not found or missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Artifact not found or missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPDFErrorResponse'
  /v1/artifacts/{artifact_id}/download:
    get:
      operationId: downloadArtifact
      parameters:
        - name: artifact_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Artifact bytes
        '404':
          description: Artifact not found or missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  schemas:
    ErrorEnvelope:
      type: object
      description: Standard AgentPDF error response
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorResponse'
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
        retry_hint:
          type: string
    ToolResult:
      type: object
      description: Standard AgentPDF tool result envelope.
      required:
        - job_id
        - status
        - tool
      properties:
        job_id:
          type: string
        status:
          type: string
          enum:
            - succeeded
            - failed
        tool:
          type: string
        artifacts:
          type: array
          items:
            type: object
        validation:
          type: object
        warnings:
          type: array
          items:
            type: string
        usage:
          type: object
        next_recommended_tools:
          type: array
          items:
            type: string
        error:
          $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Artifact not found or missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPDFErrorResponse'
components:
  schemas:
    AgentPDFError:
      type: object
      description: Standard AgentPDF error response
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        retry_hint:
          type:
            - string
            - 'null'
        details:
          type: object
          additionalProperties: true
    AgentPDFErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/AgentPDFError'
    ToolResult:
      type: object
      required:
        - job_id
        - status
        - tool
      properties:
        job_id:
          type: string
        status:
          type: string
        tool:
          type: string
        error:
          $ref: '#/components/schemas/AgentPDFError'
