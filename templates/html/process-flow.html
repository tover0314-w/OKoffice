<style>
  .process-flow {
    aspect-ratio: 16/9;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: var(--slide-gap);
    padding: var(--slide-padding);
    background: var(--color-bg);
  }
  .process-flow .title {
    font-family: var(--font-display);
    font-size: var(--size-heading);
    color: var(--color-dark);
    margin: 0;
  }
  .process-flow .steps {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    align-items: center;
    align-content: center;
  }
  .process-flow .step {
    display: grid;
    gap: calc(var(--slide-gap) * 0.6);
    justify-items: center;
    text-align: center;
    position: relative;
  }
  .process-flow .step::after {
    content: '';
    position: absolute;
    top: 22px;
    right: -50%;
    width: 100%;
    height: 2px;
    background: color-mix(in srgb, var(--color-dark) 15%, transparent);
  }
  .process-flow .step:last-child::after {
    display: none;
  }
  .process-flow .step-num {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid var(--color-accent);
    display: grid;
    place-items: center;
    font-family: var(--font-mono);
    font-size: var(--size-body);
    color: var(--color-accent);
    font-weight: 700;
  }
  .process-flow .step-label {
    font-family: var(--font-body);
    font-size: var(--size-body);
    color: var(--color-primary);
    line-height: var(--line-height);
  }
</style>

<div class="process-flow">
  <h1 class="title">{{title}}</h1>
  <div class="steps">
    <div class="step"><span class="step-num">1</span><span class="step-label">Discover</span></div>
    <div class="step"><span class="step-num">2</span><span class="step-label">Design</span></div>
    <div class="step"><span class="step-num">3</span><span class="step-label">Build</span></div>
    <div class="step"><span class="step-num">4</span><span class="step-label">Deliver</span></div>
  </div>
</div>
