<style>
  .stats-metrics {
    aspect-ratio: 16/9;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: var(--slide-gap);
    padding: var(--slide-padding);
    background: var(--color-bg);
  }
  .stats-metrics .title {
    font-family: var(--font-display);
    font-size: var(--size-heading);
    color: var(--color-dark);
    margin: 0;
  }
  .stats-metrics .metrics-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--slide-gap);
    align-items: center;
    align-content: center;
  }
  .stats-metrics .metric {
    display: grid;
    gap: calc(var(--slide-gap) * 0.4);
    justify-items: center;
    text-align: center;
  }
  .stats-metrics .metric-value {
    font-family: var(--font-display);
    font-size: clamp(48px, 6vw, 72px);
    line-height: 1;
    color: var(--color-accent);
    font-weight: 700;
  }
  .stats-metrics .metric-label {
    font-family: var(--font-body);
    font-size: var(--size-body);
    color: var(--color-primary);
    opacity: 0.75;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
</style>

<div class="stats-metrics">
  <h1 class="title">{{title}}</h1>
  <div class="metrics-row">
    <div class="metric">
      <span class="metric-value">{{kicker}}</span>
      <span class="metric-label">Metric One</span>
    </div>
    <div class="metric">
      <span class="metric-value">97%</span>
      <span class="metric-label">Metric Two</span>
    </div>
    <div class="metric">
      <span class="metric-value">2.4x</span>
      <span class="metric-label">Metric Three</span>
    </div>
  </div>
</div>
