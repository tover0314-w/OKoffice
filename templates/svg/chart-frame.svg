<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF" />
  <!-- Title bar background -->
  <rect x="0" y="0" width="1280" height="72" fill="#1E3A5F" />
  <!-- Title -->
  <text x="80" y="46" font-size="28" font-family="Arial,sans-serif" fill="#FFFFFF" font-weight="bold">TITLE_HERE</text>
  <!-- Chart frame -->
  <rect x="80" y="100" width="1120" height="480" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" rx="4" />
  <!-- Chart frame inner border -->
  <rect x="120" y="130" width="1040" height="420" fill="none" stroke="#E2E8F0" stroke-width="1" rx="2" />
  <!-- Chart placeholder text -->
  <text x="640" y="340" font-size="18" font-family="Arial,sans-serif" fill="#94A3B8" text-anchor="middle">CHART_PLACEHOLDER_HERE</text>
  <!-- Y-axis label area -->
  <text x="100" y="340" font-size="12" font-family="Arial,sans-serif" fill="#94A3B8" text-anchor="middle" transform="rotate(-90,100,340)">Y_AXIS_LABEL_HERE</text>
  <!-- X-axis label -->
  <text x="640" y="570" font-size="12" font-family="Arial,sans-serif" fill="#94A3B8" text-anchor="middle">X_AXIS_LABEL_HERE</text>
  <!-- Caption below chart -->
  <text x="80" y="620" font-size="14" font-family="Arial,sans-serif" fill="#64748B">CAPTION_HERE</text>
  <!-- Source note -->
  <text x="80" y="644" font-size="12" font-family="Arial,sans-serif" fill="#94A3B8">SOURCE_HERE</text>
  <!-- Bottom accent -->
  <rect x="0" y="714" width="1280" height="6" fill="#1E3A5F" />
</svg>
