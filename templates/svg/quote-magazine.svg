<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#1E3A5F" />
  <!-- Accent bar left -->
  <rect x="120" y="160" width="6" height="360" fill="#2563EB" rx="3" />
  <!-- Large opening quote mark -->
  <text x="160" y="240" font-size="96" font-family="Georgia,serif" fill="#3B82F6" font-weight="bold">&#x201C;</text>
  <!-- Quote body text -->
  <text x="160" y="300" font-size="22" font-family="Georgia,serif" fill="#E2E8F0">QUOTE_LINE_1_HERE</text>
  <text x="160" y="334" font-size="22" font-family="Georgia,serif" fill="#E2E8F0">QUOTE_LINE_2_HERE</text>
  <text x="160" y="368" font-size="22" font-family="Georgia,serif" fill="#E2E8F0">QUOTE_LINE_3_HERE</text>
  <text x="160" y="402" font-size="22" font-family="Georgia,serif" fill="#E2E8F0">QUOTE_LINE_4_HERE</text>
  <!-- Large closing quote mark -->
  <text x="1100" y="460" font-size="96" font-family="Georgia,serif" fill="#3B82F6" font-weight="bold" text-anchor="end">&#x201D;</text>
  <!-- Attribution line -->
  <line x1="160" y1="500" x2="340" y2="500" stroke="#3B82F6" stroke-width="2" />
  <!-- Attribution name -->
  <text x="160" y="536" font-size="16" font-family="Arial,sans-serif" fill="#FFFFFF" font-weight="bold">ATTRIBUTION_NAME_HERE</text>
  <!-- Attribution role -->
  <text x="160" y="560" font-size="14" font-family="Arial,sans-serif" fill="#94A3B8">ATTRIBUTION_ROLE_HERE</text>
</svg>
