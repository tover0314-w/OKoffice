<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF" />
  <!-- Title bar background -->
  <rect x="0" y="0" width="1280" height="72" fill="#1E3A5F" />
  <!-- Title -->
  <text x="80" y="46" font-size="28" font-family="Arial,sans-serif" fill="#FFFFFF" font-weight="bold">TITLE_HERE</text>
  <!-- Left column header background -->
  <rect x="60" y="100" width="560" height="50" fill="#2563EB" rx="6" />
  <!-- Left column header text -->
  <text x="340" y="132" font-size="20" font-family="Arial,sans-serif" fill="#FFFFFF" font-weight="bold" text-anchor="middle">LEFT_HEADER_HERE</text>
  <!-- Left column body area -->
  <rect x="60" y="160" width="560" height="440" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" rx="4" />
  <!-- Left column body text -->
  <text x="80" y="200" font-size="14" font-family="Arial,sans-serif" fill="#475569">LEFT_BODY_HERE</text>
  <text x="80" y="224" font-size="14" font-family="Arial,sans-serif" fill="#475569">LEFT_BODY_LINE2_HERE</text>
  <text x="80" y="248" font-size="14" font-family="Arial,sans-serif" fill="#475569">LEFT_BODY_LINE3_HERE</text>
  <!-- Right column header background -->
  <rect x="660" y="100" width="560" height="50" fill="#DC2626" rx="6" />
  <!-- Right column header text -->
  <text x="940" y="132" font-size="20" font-family="Arial,sans-serif" fill="#FFFFFF" font-weight="bold" text-anchor="middle">RIGHT_HEADER_HERE</text>
  <!-- Right column body area -->
  <rect x="660" y="160" width="560" height="440" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" rx="4" />
  <!-- Right column body text -->
  <text x="680" y="200" font-size="14" font-family="Arial,sans-serif" fill="#475569">RIGHT_BODY_HERE</text>
  <text x="680" y="224" font-size="14" font-family="Arial,sans-serif" fill="#475569">RIGHT_BODY_LINE2_HERE</text>
  <text x="680" y="248" font-size="14" font-family="Arial,sans-serif" fill="#475569">RIGHT_BODY_LINE3_HERE</text>
  <!-- Bottom accent -->
  <rect x="0" y="714" width="1280" height="6" fill="#1E3A5F" />
</svg>
