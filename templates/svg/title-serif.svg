<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#FAFAFA" />
  <!-- Title -->
  <text x="640" y="300" font-size="40" font-family="Georgia,serif" fill="#1E293B" font-weight="bold" text-anchor="middle">TITLE_HERE</text>
  <!-- Rule line below title -->
  <line x1="440" y1="324" x2="840" y2="324" stroke="#2563EB" stroke-width="3" />
  <!-- Subtitle -->
  <text x="640" y="370" font-size="20" font-family="Georgia,serif" fill="#64748B" text-anchor="middle">SUBTITLE_HERE</text>
  <!-- Footer accent line -->
  <rect x="540" y="640" width="200" height="3" fill="#2563EB" rx="1.5" />
  <!-- Footer text -->
  <text x="640" y="670" font-size="12" font-family="Georgia,serif" fill="#94A3B8" text-anchor="middle">FOOTER_HERE</text>
</svg>
