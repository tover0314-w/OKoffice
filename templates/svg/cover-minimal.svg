<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF" />
  <!-- Accent bar top -->
  <rect x="0" y="0" width="1280" height="6" fill="#1E3A5F" />
  <!-- Accent bar left -->
  <rect x="80" y="200" width="8" height="180" fill="#2563EB" rx="4" />
  <!-- Title -->
  <text x="120" y="280" font-size="36" font-family="Arial,sans-serif" fill="#1E293B" font-weight="bold">TITLE_HERE</text>
  <!-- Subtitle -->
  <text x="120" y="330" font-size="18" font-family="Arial,sans-serif" fill="#64748B">SUBTITLE_HERE</text>
  <!-- Accent bar bottom -->
  <rect x="0" y="714" width="1280" height="6" fill="#1E3A5F" />
  <!-- Date line -->
  <text x="120" y="580" font-size="14" font-family="Arial,sans-serif" fill="#94A3B8">DATE_HERE</text>
  <!-- Author line -->
  <text x="120" y="604" font-size="14" font-family="Arial,sans-serif" fill="#94A3B8">AUTHOR_HERE</text>
</svg>
