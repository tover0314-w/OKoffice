<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF" />
  <!-- Title bar background -->
  <rect x="0" y="0" width="1280" height="72" fill="#1E3A5F" />
  <!-- Title text -->
  <text x="80" y="46" font-size="28" font-family="Arial,sans-serif" fill="#FFFFFF" font-weight="bold">TITLE_HERE</text>
  <!-- Divider line -->
  <line x1="640" y1="100" x2="640" y2="660" stroke="#E2E8F0" stroke-width="2" />
  <!-- Left column heading -->
  <text x="80" y="120" font-size="18" font-family="Arial,sans-serif" fill="#1E3A5F" font-weight="bold">LEFT_HEADING_HERE</text>
  <!-- Left column body -->
  <text x="80" y="160" font-size="14" font-family="Arial,sans-serif" fill="#475569">LEFT_BODY_HERE</text>
  <text x="80" y="184" font-size="14" font-family="Arial,sans-serif" fill="#475569">LEFT_BODY_LINE2_HERE</text>
  <text x="80" y="208" font-size="14" font-family="Arial,sans-serif" fill="#475569">LEFT_BODY_LINE3_HERE</text>
  <!-- Right column heading -->
  <text x="700" y="120" font-size="18" font-family="Arial,sans-serif" fill="#1E3A5F" font-weight="bold">RIGHT_HEADING_HERE</text>
  <!-- Right column body -->
  <text x="700" y="160" font-size="14" font-family="Arial,sans-serif" fill="#475569">RIGHT_BODY_HERE</text>
  <text x="700" y="184" font-size="14" font-family="Arial,sans-serif" fill="#475569">RIGHT_BODY_LINE2_HERE</text>
  <text x="700" y="208" font-size="14" font-family="Arial,sans-serif" fill="#475569">RIGHT_BODY_LINE3_HERE</text>
  <!-- Bottom accent -->
  <rect x="0" y="714" width="1280" height="6" fill="#1E3A5F" />
</svg>
