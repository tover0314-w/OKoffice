    <text x="60" y="400" font-size="16" font-family="Arial,sans-serif" fill="#1E293B" font-weight="bold" text-anchor="middle">STEP_3_TITLE_HERE</text>
    <text x="60" y="424" font-size="12" font-family="Arial,sans-serif" fill="#64748B" text-anchor="middle">STEP_3_DESC_HERE</text>
  </g>
  <!-- Step 4 -->
  <g transform="translate(940,0)">
