  <!-- Step 1 -->
  <g transform="translate(160,0)">
    <circle cx="60" cy="320" r="40" fill="#2563EB" />
    <text x="60" y="332" font-size="24" font-family="Arial,sans-serif" fill="#FFFFFF" font-weight="bold" text-anchor="middle">1</text>
    <text x="60" y="400" font-size="16" font-family="Arial,sans-serif" fill="#1E293B" font-weight="bold" text-anchor="middle">STEP_1_TITLE_HERE</text>
    <text x="60" y="424" font-size="12" font-family="Arial,sans-serif" fill="#64748B" text-anchor="middle">STEP_1_DESC_HERE</text>
  </g>
  <!-- Step 2 -->
  <g transform="translate(420,0)">
    <circle cx="60" cy="320" r="40" fill="#2563EB" />
