<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF" />
  <!-- Title bar background -->
  <rect x="0" y="0" width="1280" height="72" fill="#1E3A5F" />
  <!-- Title -->
  <text x="80" y="46" font-size="28" font-family="Arial,sans-serif" fill="#FFFFFF" font-weight="bold">TITLE_HERE</text>
  <!-- Card 1 -->
  <rect x="60" y="110" width="370" height="280" fill="#F0F9FF" stroke="#BFDBFE" stroke-width="1" rx="8" />
  <text x="80" y="152" font-size="18" font-family="Arial,sans-serif" fill="#1E3A5F" font-weight="bold">CARD_TITLE_1_HERE</text>
  <text x="80" y="184" font-size="14" font-family="Arial,sans-serif" fill="#475569">CARD_BODY_1_HERE</text>
  <text x="80" y="208" font-size="14" font-family="Arial,sans-serif" fill="#475569">CARD_BODY_1_LINE2_HERE</text>
  <!-- Card 2 -->
  <rect x="455" y="110" width="370" height="280" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1" rx="8" />
  <text x="475" y="152" font-size="18" font-family="Arial,sans-serif" fill="#1E3A5F" font-weight="bold">CARD_TITLE_2_HERE</text>
  <text x="475" y="184" font-size="14" font-family="Arial,sans-serif" fill="#475569">CARD_BODY_2_HERE</text>
  <text x="475" y="208" font-size="14" font-family="Arial,sans-serif" fill="#475569">CARD_BODY_2_LINE2_HERE</text>
  <!-- Card 3 -->
  <rect x="850" y="110" width="370" height="280" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1" rx="8" />
  <text x="870" y="152" font-size="18" font-family="Arial,sans-serif" fill="#1E3A5F" font-weight="bold">CARD_TITLE_3_HERE</text>
  <text x="870" y="184" font-size="14" font-family="Arial,sans-serif" fill="#475569">CARD_BODY_3_HERE</text>
  <text x="870" y="208" font-size="14" font-family="Arial,sans-serif" fill="#475569">CARD_BODY_3_LINE2_HERE</text>
  <!-- Bottom accent -->
  <rect x="0" y="714" width="1280" height="6" fill="#1E3A5F" />
  <!-- Footer notes -->
  <text x="80" y="460" font-size="14" font-family="Arial,sans-serif" fill="#94A3B8">NOTES_HERE</text>
