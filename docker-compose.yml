services:
  okpdf:
    build:
      context: .
    image: okpdf/local:dev
    command: serve --api --host 0.0.0.0 --port 7331 --safe-root /workspace
    ports:
      - "7331:7331"
    volumes:
      - .:/workspace
    environment:
      AGENTPDF_SAFE_ROOT: /workspace
      AGENTPDF_ALLOW_CLOUD: "false"
      AGENTPDF_ALLOW_URL_FETCH: "false"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:7331/healthz', timeout=3)); raise SystemExit(0 if data.get('status') == 'ok' else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
