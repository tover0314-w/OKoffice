name: Tool spec request
description: Propose or refine a public OKoffice tool contract
title: "tool: "
labels: ["enhancement", "area:tooling", "needs-triage"]
body:
  - type: input
    id: tool-name
    attributes:
      label: Tool name
      description: Use the public namespace if known.
      placeholder: "office.workflow.extract_to_sheet"
    validations:
      required: true
  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - office.*
        - word.*
        - sheet.*
        - deck.*
        - pdf.* compatibility
        - agent setup
        - not sure yet
    validations:
      required: true
  - type: textarea
    id: user-story
    attributes:
      label: Agent/user story
      placeholder: "As an agent, I need to..."
    validations:
      required: true
  - type: textarea
    id: input
    attributes:
      label: Proposed input schema
      render: json
  - type: textarea
    id: output
    attributes:
      label: Proposed output evidence
      description: Include artifacts, validation, warnings, usage, native source refs, and next recommended tools.
      render: json
  - type: checkboxes
    id: interfaces
    attributes:
      label: Required surfaces
      options:
        - label: CLI example
        - label: MCP example
        - label: REST example
        - label: Expected output example
        - label: Error example
        - label: Limitations
        - label: Dependency/license note
  - type: textarea
    id: risks
    attributes:
      label: Safety, privacy, or license risks
      description: Mention path safety, macros, metadata, redaction, external calls, large files, optional workers, or dependency constraints.
