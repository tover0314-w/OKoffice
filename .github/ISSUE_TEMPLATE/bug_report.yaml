name: Bug report
description: Report a reproducible OKoffice bug
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping make OKoffice better. If this is a vulnerability, document leak, exploit, secret, or private-file issue, do not file a public issue; follow SECURITY.md instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: "okoffice sheet extract-tables returns an unexpected cell ref when..."
    validations:
      required: true
  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - office.* cross-format
        - word.*
        - sheet.*
        - deck.*
        - pdf.* compatibility
        - agent setup / MCP / REST
        - SDK / packaging
        - Documentation / examples
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: interface
    attributes:
      label: Interface
      options:
        - CLI
        - MCP
        - REST API
        - Python library
        - TypeScript / Node SDK
        - Docker / local service
        - Documentation / examples
        - Not sure
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the exact command or request body and a minimal fixture if it is safe to share.
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual output
      description: Paste the structured ToolResult, traceback, warning, or validation report.
      render: json
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Node version, OKoffice commit/version, install method.
      placeholder: |
        OS:
        Python:
        Node:
        OKoffice commit/version:
        Install method:
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed secrets, private URLs, and sensitive document content from this issue.
          required: true
